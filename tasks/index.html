<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>업무 관리 — ENOMAD HUB</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0A1F44;--blue:#1A4FB3;--accent:#4a8cff;
  --bg:#F0F4F8;--white:#fff;--border:#E2E8F0;
  --text:#2D3748;--sub:#718096;
  --green:#16A34A;--green-bg:#F0FDF4;
  --yellow:#D97706;--yellow-bg:#FFFBEB;
  --red:#DC2626;--red-bg:#FEF2F2;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* 상단 바 */
.top-bar{background:var(--navy);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.back{color:rgba(255,255,255,0.6);text-decoration:none;font-size:13px;}
.back:hover{color:#fff;}
.top-title{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:#fff;}
.top-title span{color:#60A5FA;}

/* 직원 탭 바 */
.member-bar{background:var(--navy);padding:0 24px;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:0;overflow-x:auto;}
.member-tab{padding:10px 20px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.5);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;gap:6px;}
.member-tab:hover{color:rgba(255,255,255,0.85);}
.member-tab.active{color:#fff;border-bottom-color:#4a8cff;}
.member-tab.overview-tab{border-bottom-color:transparent;}
.member-tab.overview-tab.active{border-bottom-color:#F59E0B;}
.member-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}

/* 기간 서브탭 */
.period-bar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:0;}
.period-tab{padding:9px 18px;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
.period-tab:hover{color:var(--text);}
.period-tab.active{color:var(--navy);border-bottom-color:var(--blue);}

/* 레이아웃 */
.layout{display:grid;grid-template-columns:300px 1fr;gap:20px;padding:20px 24px;max-width:1400px;margin:0 auto;}

/* 패널 */
.panel{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.panel-header{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:13px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px;}
.panel-body{padding:16px 18px;}

/* 목표/KPI */
.section-label{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px;}
.goal-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:none;min-height:56px;}
.goal-input:focus{border-color:var(--accent);}
.kpi-item{margin-bottom:12px;}
.kpi-top{display:flex;justify-content:space-between;margin-bottom:4px;}
.kpi-name{font-size:12px;font-weight:600;}
.kpi-pct{font-size:12px;font-weight:700;color:var(--blue);}
.kpi-bar-bg{height:7px;background:#EBF0FA;border-radius:4px;overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--accent));transition:width .4s;}
.kpi-edit-row{display:flex;gap:5px;margin-top:5px;}
.kpi-edit-row input[type=text]{flex:1;border:1px solid var(--border);border-radius:5px;padding:4px 7px;font-size:11px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.kpi-edit-row input[type=range]{width:80px;accent-color:var(--blue);}
.btn-sm{padding:4px 8px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;}
.btn-add-kpi{width:100%;padding:6px;background:#EBF4FF;color:var(--blue);border:1px dashed var(--accent);border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:2px;}

/* 요약 */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.summary-card{background:var(--bg);border-radius:8px;padding:9px 10px;text-align:center;}
.summary-num{font-size:20px;font-weight:700;}
.summary-lbl{font-size:9px;color:var(--sub);margin-top:1px;}
.s-total{color:var(--navy);}
.s-done{color:var(--green);}
.s-ing{color:var(--blue);}
.s-high{color:var(--red);}

/* 업무 목록 */
.task-toolbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:4px 11px;border-radius:14px;border:1px solid var(--border);background:#fff;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.filter-btn.active,.filter-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn-add-task{margin-left:auto;padding:6px 14px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* 업무 카드 */
.task-card{background:#fff;border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:8px;border-left:4px solid var(--border);}
.task-card.priority-high{border-left-color:var(--red);}
.task-card.priority-mid{border-left-color:var(--yellow);}
.task-card.priority-low{border-left-color:var(--green);}
.task-card.done-card{opacity:.55;background:#fafafa;}
.task-top{display:flex;align-items:flex-start;gap:9px;}
.task-check{width:17px;height:17px;border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:2px;accent-color:var(--navy);}
.task-main{flex:1;min-width:0;}
.task-title-text{font-size:13px;font-weight:600;margin-bottom:4px;word-break:break-all;}
.done-card .task-title-text{text-decoration:line-through;color:var(--sub);}
.task-meta{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:9px;}
.tag-high{background:var(--red-bg);color:var(--red);}
.tag-mid{background:var(--yellow-bg);color:var(--yellow);}
.tag-low{background:var(--green-bg);color:var(--green);}
.tag-partner{background:#EBF4FF;color:var(--blue);}
.tag-date{background:#F7FAFC;color:var(--sub);border:1px solid var(--border);}
.task-note{font-size:11px;color:var(--sub);margin-top:5px;padding-top:5px;border-top:1px solid var(--border);}
.task-actions{display:flex;gap:3px;margin-left:auto;}
.icon-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;color:var(--sub);border-radius:4px;}
.icon-btn:hover{background:var(--bg);}
.empty-tasks{text-align:center;padding:36px 20px;color:var(--sub);}

/* ── 종합 뷰 ── */
.overview-layout{padding:20px 24px;max-width:1400px;margin:0 auto;}
.overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
.member-card{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.member-card-header{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.member-card-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.member-card-name{font-size:14px;font-weight:700;color:var(--navy);}
.member-card-role{font-size:11px;color:var(--sub);}
.member-card-body{padding:14px 18px;}
.member-stat-row{display:flex;justify-content:space-between;margin-bottom:10px;}
.member-stat{text-align:center;}
.member-stat-num{font-size:18px;font-weight:700;}
.member-stat-lbl{font-size:9px;color:var(--sub);}
.progress-wrap{margin-bottom:10px;}
.progress-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;}
.progress-bg{height:8px;background:#EBF0FA;border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width .4s;}
.task-mini{font-size:11px;padding:5px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.task-mini:last-child{border-bottom:none;}
.task-mini-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.task-mini-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.task-mini-done{text-decoration:line-through;color:var(--sub);}

/* 전체 통합 테이블 */
.all-table-wrap{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.all-table-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.all-table{width:100%;border-collapse:collapse;}
.all-table th{background:var(--navy);color:#fff;padding:9px 14px;text-align:left;font-size:11px;font-weight:700;}
.all-table td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
.all-table tr:hover td{background:#F7FAFC;}
.all-table tr.done-row td{color:var(--sub);}
.all-table tr.done-row .task-title-col{text-decoration:line-through;}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.modal-overlay.hidden{display:none;}
.modal{background:#fff;border-radius:14px;width:100%;max-width:500px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal-header{background:var(--navy);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:14px;font-weight:700;}
.modal-close{background:none;border:none;color:rgba(255,255,255,0.7);font-size:18px;cursor:pointer;}
.modal-body{padding:18px 20px;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.form-group input,.form-group textarea,.form-group select{width:100%;border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.btn{padding:8px 18px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-cancel{background:var(--bg);color:var(--sub);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:9px 20px;border-radius:18px;font-size:12px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:1000px){
  .layout{grid-template-columns:1fr;}
  .overview-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:640px){
  .overview-grid{grid-template-columns:1fr;}
  .layout{padding:12px;}
  .overview-layout{padding:12px;}
}
</style>
</head>
<body>

<div class="top-bar">
  <a class="back" href="../">← ENOMAD HUB</a>
  <div class="top-title"><span>ENOMAD</span> · 업무 관리</div>
</div>

<!-- 직원 탭 바 -->
<div class="member-bar" id="memberBar"></div>

<!-- 기간 서브탭 (개인 뷰에서만) -->
<div class="period-bar" id="periodBar">
  <div class="period-tab active" onclick="switchPeriod('daily',this)">📅 일간</div>
  <div class="period-tab" onclick="switchPeriod('weekly',this)">📆 주간</div>
  <div class="period-tab" onclick="switchPeriod('monthly',this)">🗓 월간</div>
  <div class="period-tab" onclick="switchPeriod('quarterly',this)">📊 분기</div>
  <div class="period-tab" onclick="switchPeriod('yearly',this)">🎯 연간</div>
</div>

<!-- 개인 뷰 -->
<div id="personalView">
  <div class="layout">
    <!-- 왼쪽 -->
    <div>
      <div class="panel" style="margin-bottom:14px;">
        <div class="panel-header">
          <div class="panel-title">🎯 목표 & KPI</div>
          <button class="btn-sm" style="background:var(--green-bg);color:var(--green);border:1px solid #86EFAC;" onclick="saveGoal()">저장</button>
        </div>
        <div class="panel-body">
          <div class="section-label" id="goalPeriodLabel">이번 주 목표</div>
          <textarea class="goal-input" id="goalInput" placeholder="이번 기간의 핵심 목표..."></textarea>
          <div style="height:14px;"></div>
          <div class="section-label">KPI 지표</div>
          <div id="kpiList"></div>
          <button class="btn-add-kpi" onclick="addKpi()">+ KPI 추가</button>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><div class="panel-title">📋 현황 요약</div></div>
        <div class="panel-body">
          <div class="summary-grid">
            <div class="summary-card"><div class="summary-num s-total" id="sumTotal">0</div><div class="summary-lbl">전체</div></div>
            <div class="summary-card"><div class="summary-num s-done" id="sumDone">0</div><div class="summary-lbl">완료</div></div>
            <div class="summary-card"><div class="summary-num s-ing" id="sumIng">0</div><div class="summary-lbl">진행 중</div></div>
            <div class="summary-card"><div class="summary-num s-high" id="sumHigh">0</div><div class="summary-lbl">중요도 높음</div></div>
          </div>
        </div>
      </div>
    </div>
    <!-- 오른쪽 -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title" id="taskPanelTitle">📅 일간 업무</div>
        <button class="btn-add-task" onclick="openModal()">＋ 업무 추가</button>
      </div>
      <div class="panel-body">
        <div class="task-toolbar">
          <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
          <button class="filter-btn" onclick="setFilter('ing',this)">진행 중</button>
          <button class="filter-btn" onclick="setFilter('done',this)">완료</button>
          <button class="filter-btn" onclick="setFilter('high',this)">🔴 중요</button>
        </div>
        <div id="taskList"></div>
      </div>
    </div>
  </div>
</div>

<!-- 종합 뷰 -->
<div id="overviewView" style="display:none;">
  <div class="overview-layout">
    <!-- 기간 필터 -->
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:12px;color:var(--sub);font-weight:600;">기간:</span>
      <button class="filter-btn active" id="ovPeriodBtn" onclick="switchOverviewPeriod(this)">📅 일간</button>
      <select id="ovPeriodSelect" onchange="changeOverviewPeriod(this)" style="border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;">
        <option value="daily">📅 일간</option>
        <option value="weekly">📆 주간</option>
        <option value="monthly">🗓 월간</option>
        <option value="quarterly">📊 분기</option>
        <option value="yearly">🎯 연간</option>
      </select>
    </div>
    <!-- 직원별 카드 -->
    <div class="overview-grid" id="overviewGrid"></div>
    <!-- 전체 통합 테이블 -->
    <div class="all-table-wrap">
      <div class="all-table-header">
        <div class="panel-title">📊 전체 업무 통합</div>
        <div style="font-size:12px;color:var(--sub);" id="ovTableInfo"></div>
      </div>
      <div style="overflow-x:auto;">
        <table class="all-table" id="allTable">
          <thead>
            <tr>
              <th>담당자</th>
              <th>업무 내용</th>
              <th>중요도</th>
              <th>업무 파트너</th>
              <th>개시일</th>
              <th>종료일</th>
              <th>상태</th>
              <th>특이사항</th>
            </tr>
          </thead>
          <tbody id="allTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 모달 -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">업무 추가</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>업무 내용 *</label>
        <input type="text" id="f_title" placeholder="업무 내용을 입력하세요"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>업무 개시일</label>
          <input type="date" id="f_start"/>
        </div>
        <div class="form-group">
          <label>업무 종료일</label>
          <input type="date" id="f_end"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>중요도</label>
          <select id="f_priority">
            <option value="high">🔴 높음</option>
            <option value="mid" selected>🟡 중간</option>
            <option value="low">🟢 낮음</option>
          </select>
        </div>
        <div class="form-group">
          <label>업무 파트너</label>
          <input type="text" id="f_partner" placeholder="담당자 / 거래처"/>
        </div>
      </div>
      <div class="form-group">
        <label>특이사항</label>
        <textarea id="f_note" placeholder="메모, 특이사항..." style="min-height:60px;resize:vertical;"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveTask()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 멤버 설정 ──
const MEMBERS = [
  { id:'yonghee', name:'박용희', emoji:'👑', color:'#0A1F44', role:'대표' },
  { id:'hyeonkyung', name:'이현경', emoji:'🌸', color:'#7C3AED', role:'실리콘투 B2B' },
  { id:'haein', name:'김해인', emoji:'⭐', color:'#0369A1', role:'실리콘투 B2B' },
];
const PERIODS = ['daily','weekly','monthly','quarterly','yearly'];
const PERIOD_LABELS = {daily:'일간',weekly:'주간',monthly:'월간',quarterly:'분기',yearly:'연간'};
const PERIOD_GOAL_LABELS = {daily:'오늘의 목표',weekly:'이번 주 목표',monthly:'이번 달 목표',quarterly:'이번 분기 목표',yearly:'올해 목표'};
const PERIOD_PANEL = {daily:'📅 일간',weekly:'📆 주간',monthly:'🗓 월간',quarterly:'📊 분기',yearly:'🎯 연간'};

let currentMember = MEMBERS[0].id;
let currentPeriod = 'daily';
let currentFilter = 'all';
let editingId = null;
let overviewPeriod = 'daily';
let data = {}; // { memberId: { period: { goal, kpis, tasks } } }

// ── 초기화 ──
function init() {
  const saved = localStorage.getItem('enomad_tasks_v3');
  if (saved) { try { data = JSON.parse(saved); } catch(e){} }
  MEMBERS.forEach(m => {
    if (!data[m.id]) data[m.id] = {};
    PERIODS.forEach(p => {
      if (!data[m.id][p]) data[m.id][p] = { goal:'', kpis:[], tasks:[] };
    });
  });
  buildMemberBar();
  document.getElementById('f_start').value = new Date().toISOString().split('T')[0];
  switchMember(MEMBERS[0].id);
}

function saveData() { localStorage.setItem('enomad_tasks_v3', JSON.stringify(data)); }

// ── 직원 탭 바 ──
function buildMemberBar() {
  const bar = document.getElementById('memberBar');
  let html = MEMBERS.map(m => `
    <div class="member-tab ${m.id===currentMember?'active':''}" id="mtab_${m.id}" onclick="switchMember('${m.id}')">
      <div class="member-avatar" style="background:${m.color};">${m.emoji}</div>
      ${m.name}
    </div>`).join('');
  html += `<div class="member-tab overview-tab ${currentMember==='__overview__'?'active':''}" id="mtab___overview__" onclick="switchMember('__overview__')">
    📊 종합 뷰
  </div>`;
  bar.innerHTML = html;
}

// ── 직원 전환 ──
function switchMember(id) {
  currentMember = id;
  buildMemberBar();
  if (id === '__overview__') {
    document.getElementById('periodBar').style.display = 'none';
    document.getElementById('personalView').style.display = 'none';
    document.getElementById('overviewView').style.display = 'block';
    renderOverview();
  } else {
    document.getElementById('periodBar').style.display = 'flex';
    document.getElementById('personalView').style.display = 'block';
    document.getElementById('overviewView').style.display = 'none';
    renderAll();
  }
}

// ── 기간 전환 ──
function switchPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function renderAll() {
  document.getElementById('goalPeriodLabel').textContent = PERIOD_GOAL_LABELS[currentPeriod];
  document.getElementById('taskPanelTitle').textContent = PERIOD_PANEL[currentPeriod] + ' 업무';
  renderGoal(); renderKpis(); renderSummary(); renderTasks();
}

// ── 목표 ──
function renderGoal() {
  document.getElementById('goalInput').value = data[currentMember]?.[currentPeriod]?.goal || '';
}
function saveGoal() {
  data[currentMember][currentPeriod].goal = document.getElementById('goalInput').value.trim();
  saveData(); showToast('✅ 목표 저장');
}

// ── KPI ──
function renderKpis() {
  const kpis = data[currentMember]?.[currentPeriod]?.kpis || [];
  document.getElementById('kpiList').innerHTML = kpis.map((k,i) => `
    <div class="kpi-item">
      <div class="kpi-top"><span class="kpi-name">${k.name}</span><span class="kpi-pct">${k.value}%</span></div>
      <div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:${k.value}%"></div></div>
      <div class="kpi-edit-row">
        <input type="text" value="${k.name}" onchange="updateKpi(${i},'name',this.value)" placeholder="KPI명"/>
        <input type="range" min="0" max="100" value="${k.value}" oninput="updateKpiVal(${i},this.value)"/>
        <button class="btn-sm" style="background:#FFF5F5;color:#E53E3E;" onclick="removeKpi(${i})">✕</button>
      </div>
    </div>`).join('');
}
function addKpi() { data[currentMember][currentPeriod].kpis.push({name:'새 KPI',value:0}); saveData(); renderKpis(); }
function updateKpi(i,f,v) { data[currentMember][currentPeriod].kpis[i][f]=v; saveData(); renderKpis(); }
function updateKpiVal(i,v) { data[currentMember][currentPeriod].kpis[i].value=parseInt(v); saveData(); renderKpis(); }
function removeKpi(i) { data[currentMember][currentPeriod].kpis.splice(i,1); saveData(); renderKpis(); }

// ── 요약 ──
function renderSummary() {
  const tasks = data[currentMember]?.[currentPeriod]?.tasks || [];
  document.getElementById('sumTotal').textContent = tasks.length;
  document.getElementById('sumDone').textContent  = tasks.filter(t=>t.done).length;
  document.getElementById('sumIng').textContent   = tasks.filter(t=>!t.done).length;
  document.getElementById('sumHigh').textContent  = tasks.filter(t=>t.priority==='high').length;
}

// ── 업무 목록 ──
function renderTasks() {
  const all = data[currentMember]?.[currentPeriod]?.tasks || [];
  const tasks = all.filter(t => {
    if (currentFilter==='done') return t.done;
    if (currentFilter==='ing')  return !t.done;
    if (currentFilter==='high') return t.priority==='high';
    return true;
  });
  if (!tasks.length) {
    document.getElementById('taskList').innerHTML = '<div class="empty-tasks"><div style="font-size:32px;margin-bottom:8px;">📋</div>등록된 업무가 없습니다</div>';
    return;
  }
  document.getElementById('taskList').innerHTML = tasks.map(t => {
    const ptag = `<span class="tag tag-${t.priority}">${{high:'🔴 높음',mid:'🟡 중간',low:'🟢 낮음'}[t.priority]}</span>`;
    const partner = t.partner ? `<span class="tag tag-partner">👤 ${t.partner}</span>` : '';
    const start   = t.start   ? `<span class="tag tag-date">📅 ${t.start}</span>` : '';
    const end     = t.end     ? `<span class="tag tag-date">⏰ ${t.end}</span>` : '';
    const note    = t.note    ? `<div class="task-note">💬 ${t.note}</div>` : '';
    return `<div class="task-card priority-${t.priority} ${t.done?'done-card':''}">
      <div class="task-top">
        <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleDone('${t.id}',this.checked)"/>
        <div class="task-main">
          <div class="task-title-text">${t.title}</div>
          <div class="task-meta">${ptag}${partner}${start}${end}</div>
          ${note}
        </div>
        <div class="task-actions">
          <button class="icon-btn" onclick="openModal('${t.id}')">✏️</button>
          <button class="icon-btn" onclick="deleteTask('${t.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setFilter(f,btn) {
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}

// ── CRUD ──
function toggleDone(id,checked) {
  const t=data[currentMember][currentPeriod].tasks.find(x=>x.id===id);
  if(t){t.done=checked;saveData();renderSummary();renderTasks();}
}
function deleteTask(id) {
  if(!confirm('삭제하시겠습니까?')) return;
  data[currentMember][currentPeriod].tasks=data[currentMember][currentPeriod].tasks.filter(x=>x.id!==id);
  saveData();renderSummary();renderTasks();
}
function openModal(id) {
  editingId=id||null;
  document.getElementById('modalOverlay').classList.remove('hidden');
  if(id) {
    const t=data[currentMember][currentPeriod].tasks.find(x=>x.id===id);
    if(!t) return;
    document.getElementById('modalTitle').textContent='업무 수정';
    document.getElementById('f_title').value=t.title||'';
    document.getElementById('f_start').value=t.start||'';
    document.getElementById('f_end').value=t.end||'';
    document.getElementById('f_priority').value=t.priority||'mid';
    document.getElementById('f_partner').value=t.partner||'';
    document.getElementById('f_note').value=t.note||'';
  } else {
    document.getElementById('modalTitle').textContent='업무 추가';
    document.getElementById('f_title').value='';
    document.getElementById('f_start').value=new Date().toISOString().split('T')[0];
    document.getElementById('f_end').value='';
    document.getElementById('f_priority').value='mid';
    document.getElementById('f_partner').value='';
    document.getElementById('f_note').value='';
  }
}
function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); editingId=null; }
function saveTask() {
  const title=document.getElementById('f_title').value.trim();
  if(!title){alert('업무 내용을 입력해주세요');return;}
  const td={
    title, done:false,
    start:document.getElementById('f_start').value,
    end:document.getElementById('f_end').value,
    priority:document.getElementById('f_priority').value,
    partner:document.getElementById('f_partner').value.trim(),
    note:document.getElementById('f_note').value.trim(),
  };
  if(editingId){
    const idx=data[currentMember][currentPeriod].tasks.findIndex(x=>x.id===editingId);
    if(idx>=0){td.done=data[currentMember][currentPeriod].tasks[idx].done;td.id=editingId;data[currentMember][currentPeriod].tasks[idx]=td;}
  } else {
    td.id='t_'+Date.now();
    data[currentMember][currentPeriod].tasks.unshift(td);
  }
  saveData();closeModal();renderSummary();renderTasks();
  showToast(editingId?'✅ 수정 완료':'✅ 업무 추가 완료');
}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();});

// ── 종합 뷰 ──
function changeOverviewPeriod(sel) {
  overviewPeriod = sel.value;
  renderOverview();
}

function renderOverview() {
  const p = overviewPeriod;
  document.getElementById('ovPeriodSelect').value = p;

  // 직원별 카드
  const grid = document.getElementById('overviewGrid');
  grid.innerHTML = MEMBERS.map(m => {
    const tasks = data[m.id]?.[p]?.tasks || [];
    const done  = tasks.filter(t=>t.done).length;
    const total = tasks.length;
    const pct   = total ? Math.round(done/total*100) : 0;
    const kpis  = data[m.id]?.[p]?.kpis || [];
    const goal  = data[m.id]?.[p]?.goal || '목표 미설정';
    const avgKpi = kpis.length ? Math.round(kpis.reduce((s,k)=>s+k.value,0)/kpis.length) : null;

    const recentTasks = tasks.slice(0,4).map(t => `
      <div class="task-mini">
        <div class="task-mini-dot" style="background:${{high:'#DC2626',mid:'#D97706',low:'#16A34A'}[t.priority]};"></div>
        <span class="task-mini-text ${t.done?'task-mini-done':''}">${t.title}</span>
        <span style="font-size:9px;color:var(--sub);">${t.done?'✅':'🔄'}</span>
      </div>`).join('');

    return `<div class="member-card">
      <div class="member-card-header">
        <div class="member-card-avatar" style="background:${m.color};">${m.emoji}</div>
        <div>
          <div class="member-card-name">${m.name}</div>
          <div class="member-card-role">${m.role}</div>
        </div>
      </div>
      <div class="member-card-body">
        <div class="member-stat-row" style="margin-bottom:12px;">
          <div class="member-stat"><div class="member-stat-num s-total">${total}</div><div class="member-stat-lbl">전체</div></div>
          <div class="member-stat"><div class="member-stat-num s-done">${done}</div><div class="member-stat-lbl">완료</div></div>
          <div class="member-stat"><div class="member-stat-num s-ing">${total-done}</div><div class="member-stat-lbl">진행</div></div>
          ${avgKpi!==null?`<div class="member-stat"><div class="member-stat-num" style="color:var(--blue);">${avgKpi}%</div><div class="member-stat-lbl">KPI 평균</div></div>`:''}
        </div>
        <div class="progress-wrap">
          <div class="progress-label"><span style="font-size:11px;font-weight:600;">업무 완료율</span><span style="font-size:11px;font-weight:700;color:var(--blue);">${pct}%</span></div>
          <div class="progress-bg"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${m.color},${m.color}99);"></div></div>
        </div>
        <div style="font-size:11px;color:var(--sub);margin-bottom:8px;padding:6px 8px;background:var(--bg);border-radius:6px;">
          🎯 ${goal.substring(0,40)}${goal.length>40?'...':''}
        </div>
        ${recentTasks || '<div style="font-size:11px;color:var(--sub);text-align:center;padding:8px;">등록된 업무 없음</div>'}
      </div>
    </div>`;
  }).join('');

  // 통합 테이블
  let allTasks = [];
  MEMBERS.forEach(m => {
    (data[m.id]?.[p]?.tasks || []).forEach(t => {
      allTasks.push({...t, memberName:m.name, memberColor:m.color, memberEmoji:m.emoji});
    });
  });
  // 중요도 순 정렬
  const priOrder = {high:0,mid:1,low:2};
  allTasks.sort((a,b)=>(a.done-b.done)||(priOrder[a.priority]-priOrder[b.priority]));

  document.getElementById('ovTableInfo').textContent = `총 ${allTasks.length}건 · 완료 ${allTasks.filter(t=>t.done).length}건`;
  document.getElementById('allTableBody').innerHTML = allTasks.length
    ? allTasks.map(t=>`
      <tr class="${t.done?'done-row':''}">
        <td><span style="display:inline-flex;align-items:center;gap:5px;">
          <span style="background:${t.memberColor};color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;">${t.memberEmoji}</span>
          ${t.memberName}
        </span></td>
        <td class="task-title-col">${t.title}</td>
        <td><span class="tag tag-${t.priority}">${{high:'🔴 높음',mid:'🟡 중간',low:'🟢 낮음'}[t.priority]}</span></td>
        <td>${t.partner||'-'}</td>
        <td>${t.start||'-'}</td>
        <td>${t.end||'-'}</td>
        <td>${t.done?'<span style="color:var(--green);font-weight:700;">✅ 완료</span>':'<span style="color:var(--blue);font-weight:700;">🔄 진행</span>'}</td>
        <td style="color:var(--sub);">${t.note||'-'}</td>
      </tr>`).join('')
    : '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--sub);">등록된 업무가 없습니다</td></tr>';
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2300);
}

init();
</script>
</body>
</html>
